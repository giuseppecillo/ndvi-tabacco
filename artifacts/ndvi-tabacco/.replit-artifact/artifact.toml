kind = "web"
previewPath = "/"
title = "Calcolatore NDVI Tabacco"
version = "1.0.0"
id = "artifacts/ndvi-tabacco"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20899

[services.development]
run = "pnpm --filter @workspace/ndvi-tabacco run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ndvi-tabacco", "run", "build" ]
publicDir = "artifacts/ndvi-tabacco/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20899"
BASE_PATH = "/"
